name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [1.70.0, stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo test --verbose

      # Build release binary
      - name: Build release
        run: cargo build --release
        shell: bash

      # Test CLI execution
      - name: Test CLI on ${{ matrix.os }} with Rust ${{ matrix.rust }}
        run: |
          ./target/release/cli-template hello --help
          ./target/release/cli-template hello --name "Test User"
          ./target/release/cli-template config set test value
          ./target/release/cli-template config get test
        shell: bash

      # Cross-compile to multiple targets (if available)
      - name: Add cross-compile targets
        if: matrix.rust == 'stable'
        run: |
          rustup target add aarch64-unknown-linux-gnu || echo "Target already installed"
          rustup target add x86_64-unknown-linux-gnu || echo "Target already installed"
        shell: bash

      - name: Cross-compile binaries
        if: matrix.rust == 'stable' && runner.os == 'Linux'
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu || echo "Cross-compile skipped"
          cargo build --release --target x86_64-unknown-linux-gnu
        shell: bash
        continue-on-error: true

      # Capture metrics
      - name: Capture build metrics
        if: runner.os == 'Linux' && matrix.rust == 'stable'
        run: |
          echo "Build Metrics for Rust Clap" > metrics.txt
          echo "OS: ${{ matrix.os }}" >> metrics.txt
          echo "Rust Version: ${{ matrix.rust }}" >> metrics.txt
          echo "Build completed at: $(date)" >> metrics.txt
          ls -lh target/release/cli-template >> metrics.txt || echo "Binary not found" >> metrics.txt

      - name: Upload build metrics
        if: runner.os == 'Linux' && matrix.rust == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: rust-metrics-${{ matrix.os }}
          path: metrics.txt
